<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded background -->
  <rect width="64" height="64" rx="16" fill="#D4922A"/>
  <!-- Wings -->
  <ellipse cx="10" cy="50" rx="8" ry="11" fill="#A86820" transform="rotate(15 10 50)"/>
  <ellipse cx="54" cy="50" rx="8" ry="11" fill="#A86820" transform="rotate(-15 54 50)"/>
  <!-- Body -->
  <ellipse cx="32" cy="52" rx="13" ry="12" fill="#C48530"/>
  <!-- Head -->
  <circle cx="32" cy="26" r="20" fill="#D4922A"/>
  <!-- Facial disc -->
  <ellipse cx="32" cy="28" rx="16" ry="14" fill="#E8A848"/>
  <!-- Ear tufts -->
  <ellipse cx="20" cy="8" rx="4" ry="8" fill="#B07020" transform="rotate(-14 20 8)"/>
  <ellipse cx="44" cy="8" rx="4" ry="8" fill="#B07020" transform="rotate(14 44 8)"/>
  <!-- Eye surrounds -->
  <circle cx="22" cy="25" r="9" fill="#3B6D11"/>
  <circle cx="42" cy="25" r="9" fill="#3B6D11"/>
  <!-- Irises -->
  <circle cx="22" cy="25" r="6.5" fill="#FAC775"/>
  <circle cx="42" cy="25" r="6.5" fill="#FAC775"/>
  <!-- Pupils -->
  <circle cx="22" cy="25" r="3.5" fill="#1A0E05"/>
  <circle cx="42" cy="25" r="3.5" fill="#1A0E05"/>
  <!-- Highlights -->
  <circle cx="20.5" cy="23.5" r="1.3" fill="white"/>
  <circle cx="40.5" cy="23.5" r="1.3" fill="white"/>
  <!-- Beak -->
  <path d="M28 33 L32 39 L36 33Z" fill="#E07820"/>
</svg>
